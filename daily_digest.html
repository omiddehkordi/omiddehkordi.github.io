<!DOCTYPE html>
<html lang="en">

<head>
    <title>Omid H Dehkordi | Daily Digest</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Omid H Dehkordi - Daily Research Digest" />
    <meta name="robots" content="index,follow" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-M11CMZ12Q"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-M11CMZ12Q');
    </script>
</head>

<body>
    <div class="main">
        <h2>Daily Research Digest</h2>
        <h4><!-- DATE --></h4>
        <div id="content">
            <!-- DIGEST CONTENT -->
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script src="assets/js/app.js"></script>
    <script>
(async function () {
  const h4 = document.querySelector('.main > h4');
  const contentDiv = document.getElementById('content');

  const todayStr = new Date().toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  let entries = [];
  try {
    const res = await fetch('digest.json?v=' + Date.now());
    if (res.ok) entries = await res.json();
  } catch (e) {}

  if (!entries || !entries.length) {
    h4.textContent = '';
    contentDiv.innerHTML = '<p style="color:#888;font-size:14px;">No digests yet.</p>';
    return;
  }

  // Build date selector
  const sel = document.createElement('select');
  sel.style.cssText = [
    'font-size:2rem',
    'font-weight:500',
    'color:#111',
    'background:none',
    'border:none',
    'border-bottom:1px solid #ccc',
    'padding:0',
    'cursor:pointer',
    'outline:none',
    'font-family:inherit',
    'max-width:100%',
  ].join(';');

  entries.forEach(function (e) {
    const opt = document.createElement('option');
    opt.value = e.date;
    opt.textContent = e.date;
    sel.appendChild(opt);
  });

  h4.innerHTML = '';
  h4.appendChild(sel);

  // "No entry for today" note
  const note = document.createElement('p');
  note.style.cssText = 'color:#aaa;font-size:13px;margin-top:-36px;margin-bottom:36px;';
  note.textContent = 'No entry for today yet — showing most recent';

  const todayExists = entries.some(function (e) { return e.date === todayStr; });
  if (todayExists) {
    sel.value = todayStr;
  } else {
    sel.value = entries[0].date;
    h4.after(note);
  }

  function render(date) {
    const entry = entries.find(function (e) { return e.date === date; });
    contentDiv.innerHTML = entry ? entry.content : '';
  }

  render(sel.value);

  sel.addEventListener('change', function () {
    note.remove();
    render(sel.value);
  });
})();
    </script>
</body>

</html>
